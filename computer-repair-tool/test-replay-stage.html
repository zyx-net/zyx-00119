<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 回放演练台 - 回归测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #1a1d23; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 16px; color: #4fc3f7; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: #242830; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .summary-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 120px; background: #2d323c; border-radius: 6px; padding: 14px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    .num-pass { color: #4caf50; }
    .num-fail { color: #ef5350; }
    .num-total { color: #4fc3f7; }
    .num-rate { color: #ffb74d; }
    .btn { background: #4fc3f7; color: #1a1d23; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .btn:hover { background: #81d4fa; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .test-list { margin-top: 12px; }
    .test-item { padding: 8px 12px; border-radius: 4px; margin-bottom: 4px; font-family: Consolas, monospace; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .test-pass { background: rgba(76,175,80,0.1); color: #81c784; }
    .test-fail { background: rgba(239,83,80,0.1); color: #e57373; }
    .test-error { color: #ffb74d; margin-left: 20px; font-size: 12px; padding: 4px 0; }
    .icon { width: 16px; display: inline-block; }
    .module-title { color: #ffb74d; font-size: 14px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #3a3f4b; }
    #output { background: #0f1115; padding: 16px; border-radius: 6px; font-family: Consolas, monospace; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .log-info { color: #90caf9; }
    .log-pass { color: #81c784; }
    .log-fail { color: #e57373; }
    .log-warn { color: #ffb74d; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .status { font-size: 13px; color: #888; }
    .banner { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .banner-pass { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #81c784; }
    .banner-fail { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3); color: #e57373; }
    .banner-info { background: rgba(79,195,247,0.15); border: 1px solid rgba(79,195,247,0.3); color: #4fc3f7; }
    .quick-nav { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .chip { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; background: #2d323c; color: #aaa; cursor: pointer; }
    .chip:hover { background: #3a3f4b; color: #fff; }
    .progress-bar { height: 6px; background: #2d323c; border-radius: 3px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4fc3f7, #4caf50); width: 0; transition: width .2s; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 回放演练台 - 回归测试</h1>

    <div id="banner"></div>

    <div class="card">
      <div class="header-row">
        <div class="status" id="status">准备就绪，点击运行测试</div>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="btnRun" onclick="startTests()">▶ 运行全部测试</button>
        </div>
      </div>
      <div class="summary-row">
        <div class="stat">
          <div class="stat-num num-total" id="num-total">0</div>
          <div class="stat-label">总用例</div>
        </div>
        <div class="stat">
          <div class="stat-num num-pass" id="num-pass">0</div>
          <div class="stat-label">通过</div>
        </div>
        <div class="stat">
          <div class="stat-num num-fail" id="num-fail">0</div>
          <div class="stat-label">失败</div>
        </div>
        <div class="stat">
          <div class="stat-num num-rate" id="num-rate">0%</div>
          <div class="stat-label">通过率</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="card">
      <div class="quick-nav">
        <span class="chip" onclick="document.getElementById('sec-se').scrollIntoView({behavior:'smooth'})">📦 ScenarioEngine</span>
        <span class="chip" onclick="document.getElementById('sec-df').scrollIntoView({behavior:'smooth'})">📝 DraftEngine</span>
        <span class="chip" onclick="document.getElementById('sec-pm').scrollIntoView({behavior:'smooth'})">🔐 权限</span>
        <span class="chip" onclick="document.getElementById('sec-ex').scrollIntoView({behavior:'smooth'})">▶️ 执行引擎</span>
        <span class="chip" onclick="document.getElementById('sec-rb').scrollIntoView({behavior:'smooth'})">↩️ 撤销回滚</span>
        <span class="chip" onclick="document.getElementById('sec-pk').scrollIntoView({behavior:'smooth'})">📦 导入导出</span>
        <span class="chip" onclick="document.getElementById('sec-diff').scrollIntoView({behavior:'smooth'})">🔍 差异对比</span>
        <span class="chip" onclick="document.getElementById('sec-st').scrollIntoView({behavior:'smooth'})">💾 跨重启恢复</span>
      </div>
      <div id="test-list"></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 12px; color: #90caf9;">控制台输出</h3>
      <div id="output"></div>
    </div>
  </div>

  <script>
    var origLog = console.log.bind(console);
    var logs = [];
    console.log = function() {
      var msg = Array.prototype.slice.call(arguments).map(function(a){
        if (typeof a === 'object') try { return JSON.stringify(a); } catch(e){ return String(a); }
        return String(a);
      }).join(' ');
      logs.push({ ts: new Date().toLocaleTimeString(), msg: msg });
      origLog.apply(console, arguments);
    };
    var origWarn = console.warn.bind(console);
    console.warn = function() {
      var msg = Array.prototype.slice.call(arguments).map(function(a){
        if (typeof a === 'object') try { return JSON.stringify(a); } catch(e){ return String(a); }
        return String(a);
      }).join(' ');
      logs.push({ ts: new Date().toLocaleTimeString(), msg: '⚠️ ' + msg, level: 'warn' });
      origWarn.apply(console, arguments);
    };
    var origErr = console.error.bind(console);
    console.error = function() {
      var msg = Array.prototype.slice.call(arguments).map(function(a){
        if (typeof a === 'object') try { return JSON.stringify(a); } catch(e){ return String(a); }
        return String(a);
      }).join(' ');
      logs.push({ ts: new Date().toLocaleTimeString(), msg: '❌ ' + msg, level: 'error' });
      origErr.apply(console, arguments);
    };

    function renderLogs() {
      var el = document.getElementById('output');
      el.innerHTML = logs.map(function(l) {
        var cls = 'log-info';
        if (l.msg.indexOf('✅') > -1 || l.msg.indexOf('PASS') > -1 || l.msg.indexOf('通过') > -1) cls = 'log-pass';
        if (l.msg.indexOf('❌') > -1 || l.msg.indexOf('FAIL') > -1 || l.msg.indexOf('失败') > -1) cls = 'log-fail';
        if (l.level === 'warn' || l.msg.indexOf('⚠️') > -1) cls = 'log-warn';
        return '<div class="' + cls + '"><span style="opacity:.5">[' + l.ts + ']</span> ' + l.msg.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
      }).join('');
      el.scrollTop = el.scrollHeight;
    }
    setInterval(renderLogs, 300);
  </script>

  <script src="app.js"></script>
  <script src="test-replay-stage.js"></script>

  <script>
    var testStartTime = 0;
    function startTests() {
      var btn = document.getElementById('btnRun');
      btn.disabled = true;
      btn.textContent = '⏳ 执行中...';
      document.getElementById('status').textContent = '正在执行测试，请稍候...';
      document.getElementById('test-list').innerHTML = '';
      document.getElementById('banner').innerHTML = '<div class="banner banner-info">🚀 测试已启动，请等待异步用例执行完成...</div>';
      logs = [];
      testStartTime = Date.now();
      document.getElementById('num-total').textContent = '...';
      document.getElementById('num-pass').textContent = '0';
      document.getElementById('num-fail').textContent = '0';
      document.getElementById('num-rate').textContent = '0%';
      document.getElementById('progress').style.width = '5%';

      var p = window.TestReplayStage.runAllTests();
      if (p && typeof p.then === 'function') {
        var progressTimer = setInterval(function(){
          var tests = window.TestReplayStage.TestRunner.getTests();
          var done = tests.filter(function(t){ return t.pass || t.error; }).length;
          if (tests.length > 0) {
            document.getElementById('progress').style.width = Math.min(95, Math.round((done / tests.length) * 100)) + '%';
            renderLiveList();
          }
        }, 300);

        p.then(function(result){
          clearInterval(progressTimer);
          setTimeout(function(){ renderResult(result); }, 500);
        }).catch(function(err){
          clearInterval(progressTimer);
          document.getElementById('banner').innerHTML = '<div class="banner banner-fail">💥 执行异常：' + err.message + '</div>';
          btn.disabled = false;
          btn.textContent = '▶ 运行全部测试';
        });
      } else {
        setTimeout(function(){ renderResult(window.TEST_RESULT || window.TestReplayStage.TestRunner.getSummary()); }, 1500);
      }
    }

    function renderLiveList(){
      var tests = window.TestReplayStage.TestRunner.getTests();
      var total = tests.length;
      var passCount = 0, failCount = 0;
      tests.forEach(function(t){ if (t.pass) passCount++; if (t.error) failCount++; });
      document.getElementById('num-total').textContent = total;
      document.getElementById('num-pass').textContent = passCount;
      document.getElementById('num-fail').textContent = failCount;
      if (total > 0) document.getElementById('num-rate').textContent = Math.round((passCount / total) * 100) + '%';
      document.getElementById('status').textContent = '执行中... 已完成 ' + (passCount + failCount) + '/' + total;
    }

    function renderResult(result) {
      var btn = document.getElementById('btnRun');
      btn.disabled = false;
      btn.textContent = '▶ 运行全部测试';
      if (!result) {
        document.getElementById('status').textContent = '测试结果读取失败，请查看控制台';
        return;
      }

      document.getElementById('num-total').textContent = result.total;
      document.getElementById('num-pass').textContent = result.passed;
      document.getElementById('num-fail').textContent = result.failed;
      document.getElementById('num-rate').textContent = result.passRate + '%';
      document.getElementById('progress').style.width = '100%';

      var duration = ((Date.now() - testStartTime) / 1000).toFixed(1);
      var banner = document.getElementById('banner');
      if (result.failed === 0) {
        banner.innerHTML = '<div class="banner banner-pass">🎉 全部测试通过（' + result.passed + '/' + result.total + '），通过率 ' + result.passRate + '%，耗时 ' + duration + ' 秒</div>';
      } else {
        banner.innerHTML = '<div class="banner banner-fail">⚠️ 存在失败用例（' + result.failed + '/' + result.total + '），通过率 ' + result.passRate + '%，请查看下方详情</div>';
      }

      var tests = window.TestReplayStage.TestRunner.getTests();
      var html = '';
      var currentModule = '';
      var moduleMap = {
        'ScenarioEngine 演练CRUD': 'sec-se',
        'DraftEngine 草稿管理': 'sec-df',
        'ReplayPermission 角色权限': 'sec-pm',
        'ScenarioExecutionEngine 执行引擎': 'sec-ex',
        '批次撤销（快照回滚）': 'sec-rb',
        'ScenarioPackageEngine 包导入导出': 'sec-pk',
        'ScenarioDiffEngine 差异对比': 'sec-diff',
        'ReplayStateManager 跨重启恢复': 'sec-st'
      };
      tests.forEach(function(t) {
        if (t.module !== currentModule) {
          currentModule = t.module;
          html += '<div class="module-title" id="' + (moduleMap[currentModule] || '') + '">📦 ' + currentModule + '</div>';
        }
        var icon = t.pass ? '<span class="icon">✅</span>' : '<span class="icon">❌</span>';
        var cls = t.pass ? 'test-pass' : 'test-fail';
        html += '<div class="test-item ' + cls + '">' + icon + t.name;
        if (!t.pass && t.error) {
          html += '<div class="test-error">💥 ' + t.error.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
        }
        html += '</div>';
      });

      document.getElementById('test-list').innerHTML = html;
      document.getElementById('status').textContent = '测试完成于 ' + new Date().toLocaleString() + '（耗时 ' + duration + ' 秒）';
    }

    window.onload = function() {
      console.log('🎬 回放演练台 - 回归测试已就绪');
      console.log('测试覆盖 8 大模块：ScenarioEngine / DraftEngine / ReplayPermission / ScenarioExecutionEngine / 批次撤销 / ScenarioPackageEngine / ScenarioDiffEngine / ReplayStateManager');
      console.log('点击「▶ 运行全部测试」或调用 TestReplayStage.runAllTests() 开始');
    };
  </script>
</body>
</html>
